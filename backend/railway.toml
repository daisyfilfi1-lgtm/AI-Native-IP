# Railway Config as Code（服务 Root Directory 设为 backend 时生效）
# 显式使用 Docker 构建：上下文为 backend/，使用本目录下 Dockerfile。
# RQ Worker 服务勿用本文件：见 railway.worker.toml（Worker 无 HTTP，/health 会导致部署失败）。
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# 让边缘网关知道应用何时就绪；路径与 app.main 中 /health 一致。
# 若仍 502，请看 Deploy Logs 里 Uvicorn 监听的端口，与 Networking「转发端口」必须相同。
[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300

