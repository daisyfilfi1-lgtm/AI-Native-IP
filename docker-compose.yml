# 本地开发：PostgreSQL + 可选 Qdrant
# 用法: docker-compose up -d
# 后端 .env 使用: DATABASE_URL=postgresql://postgres:postgres@localhost:5432/ip_factory

services:
  postgres:
    image: postgres:15-alpine
    container_name: ip-factory-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ip_factory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ip-factory-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles:
      - qdrant  # 默认不启动，需用 docker-compose --profile qdrant up -d

volumes:
  postgres_data: {}
  qdrant_data: {}
