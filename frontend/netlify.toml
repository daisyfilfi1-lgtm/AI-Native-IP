[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Direct redirect to Railway backend (bypass Edge function routing issues)
[[redirects]]
  from = "/api/*"
  to = "https://ai-native-ip-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://ai-native-ip-production.up.railway.app/health"
  status = 200
  force = true