# =============================================================================
# 部署约定（ai-native-ip-frontend 仓库 = Next 在仓库根目录 app/，无 frontend/ 子目录）
#
# Netlify 控制台（Site settings → Build & deploy → Build settings）请与下文一致，
# 否则会与 netlify.toml 冲突，常见错误：Base directory 指向不存在的 frontend/。
#
#   Base directory：留空  （或依赖下方 [build].base="."，勿填 frontend）
#   Build command：npm run build
#   Publish directory：.next  （勿填 frontend/.next）
#   Package directory：留空
#
# 若控制台仍填 Base=frontend，解析配置时会报「Base directory does not exist」。
# =============================================================================
[build]
  # 显式锁定仓库根，覆盖控制台里误设的 base=frontend
  base = "."
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Edge Functions 配置
[[edge_functions]]
  function = "api-proxy"
  path = "/api/*"

# API 代理到 Railway
[[redirects]]
  from = "/api/*"
  to = "https://ai-native-ip-production.up.railway.app/api/:splat"
  status = 200
  force = true

# 健康检查
[[redirects]]
  from = "/health"
  to = "https://ai-native-ip-production.up.railway.app/health"
  status = 200
  force = true

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─────────────────────────────────────────────
# 静态资源缓存优化
# ─────────────────────────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─────────────────────────────────────────────
# CORS 头（全局）
# ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[dev]
  command = "npm run dev"
  targetPort = 3000
  publish = ".next"
